name: Build Ailarm APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
        continue-on-error: true

      - name: Install Android build tools manually
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" || true

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA project
        run: |
          mkdir -p ./twa-build
          bubblewrap init \
            --manifest https://Tamaki-rgb.github.io/ailarm/manifest.json \
            --directory ./twa-build \
            --skipPwaValidation
        timeout-minutes: 5
        continue-on-error: true

      - name: Copy twa-manifest fallback
        run: |
          if [ ! -f ./twa-build/twa-manifest.json ]; then
            echo "Init failed, copying twa-manifest.json manually"
            cp twa-manifest.json ./twa-build/twa-manifest.json
          fi

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore ./twa-build/android.keystore \
            -alias ailarm \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ailarm123 \
            -keypass ailarm123 \
            -dname "CN=Ailarm, OU=App, O=Ailarm, L=City, S=State, C=US" \
            -noprompt

      - name: Build APK
        working-directory: ./twa-build
        run: |
          bubblewrap build --skipPwaValidation
        timeout-minutes: 15

      - name: Find and copy APK
        run: |
          APK=$(find . -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" ./ailarm.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ailarm-apk
          path: ailarm.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Ailarm v1.0.${{ github.run_number }}
          body: Ailarm — умный будильник. Установи ailarm.apk на Android.
          files: ailarm.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

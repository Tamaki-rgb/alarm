name: Build Ailarm APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA
        run: |
          mkdir -p twa
          cp twa-manifest.json twa/twa-manifest.json
          cd twa
          bubblewrap update --manifest https://Tamaki-rgb.github.io/ailarm/manifest.json
        continue-on-error: true

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore ./twa/android.keystore \
            -alias ailarm \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ailarm123 \
            -keypass ailarm123 \
            -dname "CN=Ailarm, OU=App, O=Ailarm, L=NY, S=NY, C=US" \
            -noprompt

      - name: Build APK
        working-directory: ./twa
        run: echo "n" | bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ailarm-apk
          path: twa/*.apk

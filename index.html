<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ailarm</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg width="52" height="52" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="42" stroke="currentColor" stroke-width="9"/>
                    <circle cx="50" cy="50" r="18" fill="currentColor"/>
                    <path d="M50 22 V35" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
                    <path d="M50 65 V78" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>Ailarm</h1>
            <button id="theme-toggle" class="theme-btn">🌙</button>
        </header>

        <main class="bento-grid">
            <!-- Карточка Будильники -->
            <div class="card alarms-card">
                <h2>Будильники</h2>
                <div id="alarms-list"></div>
                <button id="add-alarm-btn" class="add-btn">+ Новый будильник</button>
            </div>

            <!-- Карточка Таймер -->
            <div class="card timer-card">
                <h2>Таймер</h2>
                <div class="timer-display" id="timer-display">00:00</div>
                <div class="drum-container">
                    <div class="drum" id="minutes-drum"></div>
                    <div class="drum" id="seconds-drum"></div>
                </div>
                <div class="timer-controls">
                    <button id="timer-start">Старт</button>
                    <button id="timer-pause">Пауза</button>
                    <button id="timer-reset">Сброс</button>
                </div>
                <button id="stopwatch-btn">Секундомер</button>
            </div>

            <!-- Карточка Задачи -->
            <div class="card tasks-card">
                <h2>Задачи на день</h2>
                <div id="tasks-list"></div>
                <button id="add-task-btn" class="add-btn">+ Добавить задачу</button>
            </div>
        </main>
    </div>

    <!-- Модальные окна -->
    <div id="alarm-modal" class="modal"></div>
    <div id="task-modal" class="modal"></div>
    <div id="alarm-active" class="alarm-screen hidden"></div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    </script>
</body>
</html>
